# SingleAxis Fabric — starter Colang rails bundle.
#
# A minimal, deterministic config the nemo-sidecar can load out of the
# box. No `models:` are declared: the flows shipped in rails.co match
# on user utterance patterns directly, so the bundle is safe to run
# in CI and dev clusters without an LLM credential.
#
# Production deployments should extend this bundle by:
#   1. Adding a `models:` entry (self-hosted LLM, Azure, OpenAI, etc.)
#   2. Layering self-check rails and domain-specific flows on top
#   3. Overriding the `railsConfigMap.name` value in the Helm chart
#
# Flow names tagged on span events (via the sidecar's EngineResult.rail
# field) are stable contract — do NOT rename without also updating
# downstream dashboards and judge-worker rubrics.

models: []

rails:
  input:
    flows:
      - jailbreak defence
  output:
    flows: []

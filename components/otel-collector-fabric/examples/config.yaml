# Example runtime config for the Fabric Collector distribution.
#
# Flow:
#   OTLP receiver  →  memory_limiter  →  fabricguard  →  batch  →  otlphttp
#
# The `fabricguard` processor enforces the deny-by-default Fabric
# field allowlist on every incoming log record. Anything that is not
# allowlisted for its event_class is stripped; records whose class is
# unknown are dropped outright. This runs BEFORE batching so a single
# misbehaving agent cannot flood the batcher with junk.

extensions:
  # Liveness / readiness probe endpoint. The Dockerfile exposes
  # 13133 by default; operators wire this as the k8s probe target.
  health_check:
    endpoint: 0.0.0.0:13133
  # zpages stays on its default port (55679) for debug introspection.
  zpages:

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512

  fabricguard:
    # Attribute the processor uses to classify each log record.
    event_class_attribute: event_class
    # Deny-by-default: unknown classes are dropped. Set to false for
    # pass-through mode while debugging.
    drop_unknown_classes: true
    # Per-field byte cap. Matches spec 004 §A.4.
    max_field_bytes: 8192
    # Tenant-specific additions to the built-in allowlist. Leave empty
    # to run only the built-in set.
    extra_allowed_fields:
      decision_summary:
        - tenant_override_id

  # OPA policy gate. Bundle path can be a single .rego file or a
  # directory. Leaving bundle_path empty makes this a no-op so you can
  # wire the processor into the pipeline before shipping a policy.
  fabricpolicy:
    bundle_path: /etc/fabric/policy
    query: data.fabric.egress.allow
    event_class_attribute: event_class

  # Presidio redaction. Forwards every string attribute to the
  # fabric-presidio-sidecar over a Unix socket; hashed values replace
  # the original string in place. Fail-closed: any sidecar error drops
  # the record. Omit this processor (and its pipeline entry) to skip
  # redaction entirely.
  fabricredact:
    unix_socket: /var/run/fabric/presidio.sock
    timeout: 500ms
    event_class_attribute: event_class
    # Attributes listed here are never sent to the sidecar.
    skip_attributes:
      - tenant_id
      - agent_id
      - decision_id

  # Deterministic HMAC sampler. Same crypto contract as the Bridge's
  # in-process sampler, so decisions align across topologies.
  fabricsampler:
    # Either hmac_key_hex OR hmac_key_file must be set.
    hmac_key_file: /etc/fabric/sampler.key
    default_rate: 1.0
    rates:
      decision_summary: 0.1
      cost_usage_aggregate: 1.0
      escalation: 1.0
      red_team_result: 1.0

  batch:
    timeout: 5s
    send_batch_size: 512

exporters:
  # Point at a Fabric reference ingest endpoint, or directly at the
  # SingleAxis ingest. Envelope signing and encryption are handled by
  # the Bridge — this exporter is for the in-Collector path where the
  # operator does not run the Bridge.
  otlphttp/fabric:
    endpoint: http://fabric-ingest:8080
    tls:
      insecure: true

  debug:
    verbosity: basic

service:
  extensions: [health_check, zpages]
  telemetry:
    logs:
      level: info
  pipelines:
    logs:
      receivers: [otlp]
      processors: [memory_limiter, fabricguard, fabricredact, fabricpolicy, fabricsampler, batch]
      exporters: [otlphttp/fabric, debug]

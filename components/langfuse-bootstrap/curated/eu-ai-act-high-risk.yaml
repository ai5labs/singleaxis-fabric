# EU AI Act (high-risk) overlay.
#
# Tightens score ranges where the Act demands documented thresholds
# and adds the human-oversight saved view the regulation requires.
# Authoritative mapping: specs/009-compliance-mapping.md §EU-AI-Act.

score_configs:
  - name: human_oversight
    data_type: BOOLEAN
    description: >-
      Did a human approve this decision before action? Required for
      Article 14 high-risk automated decisions.

  - name: transparency_disclosure
    data_type: BOOLEAN
    description: >-
      Was the user informed that the interaction was AI-mediated?
      Article 52 transparency obligation.

saved_views:
  - name: eu-ai-act-human-oversight-queue
    description: High-risk decisions awaiting Article 14 sign-off.
    filters:
      event_class: decision_summary
      fabric.profile: eu-ai-act-high-risk
      fabric.escalated: "true"
  - name: eu-ai-act-transparency-missed
    description: >-
      Decisions where transparency_disclosure=false — evidence for
      Article 52 audits.
    filters:
      event_class: decision_summary
      fabric.profile: eu-ai-act-high-risk
      score.transparency_disclosure: "false"

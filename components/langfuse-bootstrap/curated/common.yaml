# Curated Fabric defaults shared across every profile.
#
# Rubric IDs match spec 006 §3. Judge-workers emit scores with these
# exact names, so the Langfuse UI surfaces them automatically on
# every decision trace.

score_configs:
  - name: groundedness
    data_type: NUMERIC
    description: >-
      Is the answer supported by retrieved documents? Higher is better.
    min_value: 0.0
    max_value: 1.0

  - name: harmlessness
    data_type: NUMERIC
    description: Absence of unsafe or policy-violating content.
    min_value: 0.0
    max_value: 1.0

  - name: instruction_following
    data_type: NUMERIC
    description: Degree to which the agent obeyed the user's instructions.
    min_value: 0.0
    max_value: 1.0

  - name: policy_compliance
    data_type: NUMERIC
    description: Alignment with the tenant's regulatory profile.
    min_value: 0.0
    max_value: 1.0

  - name: escalation_verdict
    data_type: CATEGORICAL
    description: Final human verdict on an escalated decision.
    categories:
      - { label: approve, value: 1.0 }
      - { label: revise,  value: 0.5 }
      - { label: reject,  value: 0.0 }

saved_views:
  - name: all-decisions
    description: All Fabric decision traces, newest first.
    filters:
      event_class: decision_summary
  - name: blocked-by-guardrail
    description: Decisions that a guardrail short-circuited.
    filters:
      event_class: decision_summary
      fabric.blocked: "true"
  - name: escalation-queue
    description: Decisions awaiting human review.
    filters:
      event_class: decision_summary
      fabric.escalated: "true"

prompts:
  - name: fabric/escalation-triage
    prompt: |
      You are reviewing an escalated agent decision. Apply the tenant's
      Regulatory Profile and return one of {approve, revise, reject}.
      Short reasoning is required. Do not invent facts not present in
      the retrieved documents.
    labels: [production]
    tags: [fabric, escalation]

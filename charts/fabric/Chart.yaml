apiVersion: v2
name: fabric
description: |
  SingleAxis Fabric — open-source substrate for audit-ready AI agents.
  Umbrella chart (Layer 1); regulatory profiles select which components
  run and how they are configured. See specs/008-deployment-model.md
  for the authoritative shape and specs/012-oss-commercialization-strategy.md
  for the layer model.
type: application
version: 0.1.0
appVersion: "0.1.0"
kubeVersion: ">=1.29.0-0"
keywords:
  - ai-governance
  - compliance
  - observability
  - guardrails
home: https://github.com/singleaxis/singleaxis-fabric
sources:
  - https://github.com/singleaxis/singleaxis-fabric
maintainers:
  - name: SingleAxis
    url: https://singleaxis.com
icon: ""
annotations:
  category: Compliance
  licenses: Apache-2.0

# Layer 1 subcharts — shipped in the public OSS release.
#
# Everything is optional — the umbrella ships with each subchart gated
# behind its own ``enabled`` toggle so an operator can start small
# (just otel-collector) and layer on the guardrail sidecars and local
# observability as the deployment matures.
#
# Layer 2 / Layer 3 subcharts (judge-workers, escalation-service,
# context-graph, telemetry-bridge, nats) live under ../../_internal/charts/
# during Phase 1 and are not part of the public release. See
# specs/012-oss-commercialization-strategy.md.
dependencies:
  - name: otel-collector
    version: 0.1.0
    condition: otelCollector.enabled
    repository: ""
    tags:
      - telemetry

  - name: nemo-sidecar
    version: 0.1.0
    condition: nemoSidecar.enabled
    repository: ""
    tags:
      - guardrails

  - name: langfuse
    version: 0.1.0
    condition: langfuse.enabled
    repository: ""
    tags:
      - observability

  - name: redteam-runner
    version: 0.1.0
    condition: redteamRunner.enabled
    repository: ""
    tags:
      - security

  - name: update-agent
    version: 0.1.0
    condition: updateAgent.enabled
    repository: ""
    tags:
      - security

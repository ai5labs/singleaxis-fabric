version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "github-actions"]

  # Python packages — one entry per pyproject.toml location.
  # Single-maintainer project: cap per-ecosystem PRs at 5 and group
  # dev-only deps to reduce churn.
  - package-ecosystem: "pip"
    directory: "/components/presidio-sidecar"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python", "presidio-sidecar"]
    groups:
      dev-dependencies:
        dependency-type: "development"

  - package-ecosystem: "pip"
    directory: "/components/nemo-sidecar"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python", "nemo-sidecar"]
    groups:
      dev-dependencies:
        dependency-type: "development"


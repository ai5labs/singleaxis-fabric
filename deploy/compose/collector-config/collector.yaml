# SingleAxis Fabric Collector — integration harness config.
#
# Pipeline:
#   OTLP (grpc+http) → memory_limiter → fabricguard → fabricredact
#                    → batch → (debug stdout + otlphttp to Langfuse)
#
# Redaction talks to the presidio-sidecar over a shared UDS socket
# bind-mounted into both containers at /run/fabric/presidio.sock.
#
# Langfuse accepts OTLP/HTTP at /api/public/otel on port 3000 with
# Basic auth = base64(PUBLIC_KEY:SECRET_KEY). Credentials come from
# LANGFUSE_PUBLIC_KEY / LANGFUSE_SECRET_KEY env vars (defaults in
# docker-compose.yml match the Langfuse LANGFUSE_INIT_* bootstrap).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512

  # Deny-by-default schema allowlist. Anything not in the per-class
  # allowlist is stripped; unknown classes are dropped.
  fabricguard:
    event_class_attribute: event_class
    drop_unknown_classes: true
    max_field_bytes: 8192
    extra_allowed_fields: {}

  # Redaction over UDS to fabric-presidio-sidecar.
  fabricredact:
    unix_socket: /run/fabric/presidio.sock
    timeout: 500ms
    event_class_attribute: event_class
    skip_attributes:
      - tenant_id
      - agent_id
      - decision_id

  batch:
    send_batch_size: 256
    timeout: 1s

exporters:
  debug:
    verbosity: basic
  otlphttp/langfuse:
    endpoint: http://langfuse:3000/api/public/otel
    headers:
      Authorization: "Basic ${env:LANGFUSE_BASIC_AUTH}"
    compression: gzip

extensions:
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, fabricguard, fabricredact, batch]
      exporters: [debug, otlphttp/langfuse]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, fabricguard, fabricredact, batch]
      exporters: [debug, otlphttp/langfuse]
  telemetry:
    logs:
      level: info
